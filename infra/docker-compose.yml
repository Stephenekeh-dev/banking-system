version: '3.8'

services:
  # =====================
  # AUTH SERVICE DATABASE
  # =====================
  auth-postgres:
    image: postgres:15
    container_name: auth_postgres
    restart: always
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: authdb
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data

  # =====================
  # ACCOUNT SERVICE DATABASE
  # =====================
  account-postgres:
    image: postgres:15
    container_name: account_postgres
    restart: always
    environment:
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_pass
      POSTGRES_DB: accountdb
    ports:
      - "5434:5432"
    volumes:
      - account_data:/var/lib/postgresql/data

  # =====================
  # TRANSACTION SERVICE DATABASE
  # =====================
  transaction-postgres:
    image: postgres:15
    container_name: transaction_postgres
    restart: always
    environment:
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_pass
      POSTGRES_DB: transactiondb
    ports:
      - "5435:5432"
    volumes:
      - transaction_data:/var/lib/postgresql/data

  # =====================
  # APPROVAL SERVICE DATABASE
  # =====================
  approval-postgres:
    image: postgres:15
    container_name: approval_postgres
    restart: always
    environment:
      POSTGRES_USER: approval_user
      POSTGRES_PASSWORD: approval_pass
      POSTGRES_DB: approvaldb
    ports:
      - "5436:5432"
    volumes:
      - approval_data:/var/lib/postgresql/data

  # =====================
  # KAFKA & ZOOKEEPER
  # =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # =====================
  # AUTH SERVICE
  # =====================
  auth-service:
    build: ../auth-service
    container_name: auth_service
    restart: always
    depends_on:
      - auth-postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
    ports:
      - "8081:8081"

  # =====================
  # ACCOUNT SERVICE
  # =====================
  account-service:
    build: ../account-service
    container_name: account_service
    restart: always
    depends_on:
      - account-postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://account-postgres:5432/accountdb
      SPRING_DATASOURCE_USERNAME: account_user
      SPRING_DATASOURCE_PASSWORD: account_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"

  # =====================
  # TRANSACTION SERVICE
  # =====================
  transaction-service:
    build: ../transaction-service
    container_name: transaction_service
    restart: always
    depends_on:
      - transaction-postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://transaction-postgres:5432/transactiondb
      SPRING_DATASOURCE_USERNAME: transaction_user
      SPRING_DATASOURCE_PASSWORD: transaction_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"

  # =====================
  # APPROVAL SERVICE
  # =====================
  approval-service:
    build: ../approval-service
    container_name: approval_service
    restart: always
    depends_on:
      - approval-postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://approval-postgres:5432/approvaldb
      SPRING_DATASOURCE_USERNAME: approval_user
      SPRING_DATASOURCE_PASSWORD: approval_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"

  # =====================
  # NOTIFICATION SERVICE (No DB)
  # =====================
  notification-service:
    build: ../notification-service
    container_name: notification_service
    restart: always
    depends_on:
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8085:8085"

  # =====================
  # AUDIT SERVICE DATABASE
  # =====================
  audit-postgres:
    image: postgres:15
    container_name: audit_postgres
    restart: always
    environment:
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_pass
      POSTGRES_DB: auditdb
    ports:
      - "5436:5432"
    volumes:
      - audit_data:/var/lib/postgresql/data

  # =====================
  # AUDIT SERVICE
  # =====================
  audit-service:
    build: ../audit-service
    container_name: audit_service
    restart: always
    depends_on:
      - audit-postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://audit-postgres:5432/audit_db
      SPRING_DATASOURCE_USERNAME: audit_user
      SPRING_DATASOURCE_PASSWORD: audit_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8085:8085"

  # =====================
  # FRAUD SERVICE DATABASE
  # =====================
  fraud-postgres:
    image: postgres:15
    container_name: fraud_postgres
    restart: always
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_pass
      POSTGRES_DB: frauddb
    ports:
      - "5436:5432"
    volumes:
      - fraud_data:/var/lib/postgresql/data

  # =====================
  # FRAUD SERVICE
  # =====================
  fraud-service:
    build: ../fraud-service
    container_name: fraud_service
    restart: always
    depends_on:
      - fraud-postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://fraud-postgres:5432/frauddb
      SPRING_DATASOURCE_USERNAME: fraud_user
      SPRING_DATASOURCE_PASSWORD: fraud_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"

  # =====================
  # GATEWAY SERVICE
  # =====================
  gateway-service:
    build: ../gateway-service
    container_name: gateway_service
    restart: always
    depends_on:
      - auth-service
      - account-service
      - transaction-service
      - fraud-service
      - approval-service
      - notification-service
    ports:
      - "8080:8080"



volumes:
  auth_data:
  account_data:
  transaction_data:
  approval_data:
  notification_data:
  audit_data:
  fraud_data: